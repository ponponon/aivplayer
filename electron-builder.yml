appId: cn.quniv.aivplayer
productName: AIVPlayer
directories:
  output: release
extraFiles:
  - from: resources/cli/aivcli.cmd
    to: aivcli.cmd
  - from: resources/cli/aivcli
    to: aivcli
files:
  - out/**
  - package.json
extraResources:
  - from: brand/icon.png
    to: app-icon.png
  - from: resources/whisper.cpp
    to: whisper.cpp
    filter:
      - '**/*'
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - '**/*'
  - from: resources/vision/siglip2-base-patch16-224-ONNX
    to: vision/siglip2-base-patch16-224-ONNX
    filter:
      - config.json
      - preprocessor_config.json
      - quantize_config.json
      - special_tokens_map.json
      - tokenizer.json
      - tokenizer.model
      - tokenizer_config.json
      - onnx/text_model_uint8.onnx
      - onnx/vision_model_uint8.onnx
fileAssociations:
  - ext: mp4
    name: MPEG-4 video
    description: Play MPEG-4 videos with AIVPlayer
    mimeType: video/mp4
    role: Viewer
  - ext: m4v
    name: MPEG-4 video
    description: Play MPEG-4 videos with AIVPlayer
    mimeType: video/mp4
    role: Viewer
  - ext: mov
    name: QuickTime video
    description: Play QuickTime videos with AIVPlayer
    mimeType: video/quicktime
    role: Viewer
  - ext: webm
    name: WebM video
    description: Play WebM videos with AIVPlayer
    mimeType: video/webm
    role: Viewer
  - ext: mkv
    name: Matroska video
    description: Play Matroska videos with AIVPlayer
    mimeType: video/x-matroska
    role: Viewer
  - ext: avi
    name: AVI video
    description: Play AVI videos with AIVPlayer
    mimeType: video/x-msvideo
    role: Viewer
  - ext: flv
    name: Flash video
    description: Play Flash videos with AIVPlayer
    mimeType: video/x-flv
    role: Viewer
  - ext: wmv
    name: Windows Media video
    description: Play Windows Media videos with AIVPlayer
    mimeType: video/x-ms-wmv
    role: Viewer
  - ext: ts
    name: MPEG transport stream
    description: Play MPEG transport streams with AIVPlayer
    mimeType: video/mp2t
    role: Viewer
  - ext: m2ts
    name: MPEG-2 transport stream
    description: Play MPEG-2 transport streams with AIVPlayer
    mimeType: video/mp2t
    role: Viewer
  - ext: mpg
    name: MPEG video
    description: Play MPEG videos with AIVPlayer
    mimeType: video/mpeg
    role: Viewer
  - ext: mpeg
    name: MPEG video
    description: Play MPEG videos with AIVPlayer
    mimeType: video/mpeg
    role: Viewer
mac:
  category: public.app-category.video
  icon: brand/icon.icns
  target:
    - dmg
    - zip
    - pkg
  identity: null
  hardenedRuntime: false
pkg:
  installLocation: /Applications
  allowCurrentUserHome: false
  scripts: pkg-scripts
win:
  icon: brand/icon.ico
  target:
    - nsis
nsis:
  include: build/installer.nsh
linux:
  icon: brand/icon.png
  executableName: aivplayer
  category: AudioVideo
  target:
    - AppImage
    - deb
deb:
  afterInstall: build/deb-after-install.sh
  afterRemove: build/deb-after-remove.sh
