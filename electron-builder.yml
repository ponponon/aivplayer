appId: cn.quniv.aivplayer
productName: AIVPlayer
directories:
  output: release
files:
  - out/**
  - package.json
extraResources:
  - from: brand/icon.png
    to: app-icon.png
  - from: resources/whisper.cpp
    to: whisper.cpp
    filter:
      - '**/*'
  - from: resources/ffmpeg
    to: ffmpeg
    filter:
      - '**/*'
mac:
  category: public.app-category.video
  icon: brand/icon.icns
  target:
    - dmg
    - zip
win:
  icon: brand/icon.ico
  target:
    - nsis
linux:
  icon: brand/icon.png
  target:
    - AppImage
